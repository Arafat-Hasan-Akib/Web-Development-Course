<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        div{
            background-color: red;
        }
        /* class selletor */
        .red{
            background-color: yellow;
        }
        /* id selector */
        #green{
            background-color: green;
        }
        /* child selector  */
        div > p {
            color: blue;
            background-color: brown;
        }

        /* Descendant Selector  */
        div p {
            color: black;
            background-color: pink;
        }
        /* Universal Selector  */
        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector  */

        a:visited{
            color: yellow;
        }
        a:link {
            color: green;
        }
        a:active {
            color: rgb(204, 204, 219);
        }
        a:hover{
            background-color: blue;
        }

        p:first-child{
            background-color: aqua;
        }


    </style>
</head>
<body>
    <main class="one">
    <p>I am first</p>
    <p>I am second</p>
    </main>
    <div class="red">
        I am a div. 
        <article>
    <p>I am a para inside div </p>
    </article>
    </div>

    <div>
        I am another div 

        <p>I am another para</p>
    </div>

    <div id="green">
        I am onse more div 
    </div>
    <a href="https://www.google.com">Go to Google</a>
</body>
</html>
