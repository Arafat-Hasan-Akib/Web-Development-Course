<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS object Fit and position</title>
    <style>
        .container{
            height: 634px;
            width: 688px;
            border: 2px solid black;
            /* background-color: azure; */
            background-position: center center;
            background-image: url(IMG_20250528_172625.jpg);
            /* background-repeat: no-repeat; */
            /* background-clip: border-box; */
        }
        img{
            width: 466px;
            height: 488px;
            object-fit: cover;
            /* object-fit: scale-down; */
            /* object-fit: fill; */
            object-position: top right;
            /* object-fit: contain; */
        }
    </style>
</head>
<body>
    <div class="container">
<!-- <img src="IMG_20250528_172625.jpg" alt=""> -->
    </div>
</body>
</html>
