<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event bubbling</title>
    <style>
        .child{
            background-color: aliceblue;
            border: 2px solid #000000;
            padding: 14px;
            margin: 14px;
            cursor: pointer;
        }

        .childContainer{
            background-color: beige;
            margin: 14px;
            padding: 14px;
        }

        .container{
            background-color: rgb(82, 82, 29);
            margin: 14px;
            padding: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="childContainer">
            <div class="child">
                Yo Yo Yo Yo
            </div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", ()=>{
            alert("Child was clicked")
        })
        document.querySelector(".childContainer").addEventListener("click", ()=>{
            alert("ChildContainer was clicked")
        })
        document.querySelector(".container").addEventListener("click", ()=>{
            alert("Container was clicked")
        })

        function getRandomColor() {
            let val1 = Math.ceil(0 + Math.random() * 255);
            let val2 = Math.ceil(0 + Math.random() * 255);
            let val3 = Math.ceil(0 + Math.random() * 255);
            return `rgb(${val1}, ${val2}, ${val3})`
        }

         setInterval(() => {
            document.querySelector(".container").style.background = getRandomColor()

        }, 100);



        setInterval(() => {
            document.querySelector(".childContainer").style.background = getRandomColor()

        }, 100);




         setInterval(() => {
            document.querySelector(".child").style.background = getRandomColor()

        }, 100);




    </script>
</body>
</html>
