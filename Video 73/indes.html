<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
    width: 300px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    margin: 10px;
    background: #f9f9f9;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 6px;
}

.card h3 {
    font-size: 14px;
    color: #555;
}

.duration {
    display: inline-block;
    background: black;
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    position: relative;
    top: -23px;
    left: -10px;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="card"></div>
    </div>
    <script>
        function createCard(title, cName, views, monthsOld, duration, thumbnail) {
    let card = document.querySelector(".card");

    let img = document.createElement("img");
    img.src = thumbnail;
    img.alt = title;
    card.appendChild(img);


    let titleEl = document.createElement("h3");
    titleEl.innerText = title;
    card.appendChild(titleEl);
    

    let channelEl = document.createElement("p");
    channelEl.innerText = `Channel: ${cName}`;
    card.appendChild(channelEl);


    let viewsEl = document.createElement("p");
    viewsEl.innerText = `${views} views • ${monthsOld} months ago`;
    card.appendChild(viewsEl);

    let durationEl = document.createElement("span");
    durationEl.innerText = duration;
    durationEl.classList.add("duration");
    card.appendChild(durationEl);
}


createCard(
    "Introduction to Backend | Sigma Web Dev Video #1",
    "CodeWithHarry",
    560000,
    17,
    "31:20",
    "card.png"
)
    </script>
</body>
</html>
