<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            text-shadow: 10px 5px 5px #e714f5;
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px #70a711;
            border-radius: 200px;
            margin: 34px;
        }

        .text-element {
            text-shadow: 10px 5px 3px #e714f5;
            outline: 2px solid red;
            padding: 34px;
            outline-offset: 9px;
            border: 2px solid black;
            border-radius: 200px;
            margin: 34px;


        }
    </style>
</head>

<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nam voluptatem sit quasi facilis
        veritatis excepturi deleniti voluptas sapiente optio quia, molestias nihil, tempore doloribus eaque dolorem
        earum deserunt! Rerum quis commodi dolore quibusdam labore!</p>
</body>

</html>
